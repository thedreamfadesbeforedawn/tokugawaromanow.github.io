<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Twitch токен для бота (через state)</title>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 50px auto; text-align: center; }
        .token { background: #f5f5f5; padding: 15px; margin: 15px 0; word-break: break-all; border-radius: 6px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
        .error { color: red; }
        .debug { background: #fff3cd; padding: 10px; margin: 15px 0; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Twitch токен для бота</h1>
    <p>Нажмите кнопку и авторизуйтесь под стримерским аккаунтом.<br>
    После возврата вы получите два токена — скопируйте их и отправьте разработчику.</p>
    <button onclick="startAuth()">Авторизоваться через Twitch</button>
    <div id="result"></div>

    <script>
        // ===== Укажите Client ID публичного приложения =====
        const CLIENT_ID = 'ah9sy9p5b1x1dab25mweoeuvbpuwin';
        const REDIRECT_URI = window.location.href.split('?')[0]; // текущий URL без параметров

        // ---------- PKCE helpers ----------
        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return base64URLEncode(array);
        }
        function base64URLEncode(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let i = 0; i < bytes.length; i++) {
                str += String.fromCharCode(bytes[i]);
            }
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return base64URLEncode(hash);
        }

        // ---------- Запуск авторизации ----------
        async function startAuth() {
            const codeVerifier = generateCodeVerifier();
            const codeChallenge = await generateCodeChallenge(codeVerifier);

            // Кодируем code_verifier и передаём как state
            const state = btoa(codeVerifier); // обычная base64, чтобы надёжно передать

            const authUrl = 'https://id.twitch.tv/oauth2/authorize?' +
                'client_id=' + CLIENT_ID +
                '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                '&response_type=code' +
                '&scope=chat:read+chat:edit' +
                '&code_challenge=' + codeChallenge +
                '&code_challenge_method=S256' +
                '&state=' + encodeURIComponent(state);   // <-- сохраняем code_verifier

            window.location.href = authUrl;
        }

        // ---------- Обмен кода на токены ----------
        async function exchangeCode(code, codeVerifier) {
            const body = new URLSearchParams({
                client_id: CLIENT_ID,
                code: code,
                grant_type: 'authorization_code',
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            });

            // Покажем отладочную информацию
            document.getElementById('result').innerHTML = 
                `<div class="debug"><b>Отладочная информация:</b>
client_id: ${CLIENT_ID}
redirect_uri: ${REDIRECT_URI}
code (начало): ${code.substring(0, 15)}...
code_verifier (начало): ${codeVerifier.substring(0, 10)}...</div>`;

            const response = await fetch('https://id.twitch.tv/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            });
            return response.json();
        }

        // ---------- При загрузке страницы ----------
        window.onload = async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            const state = urlParams.get('state');   // наш code_verifier в base64

            if (error) {
                document.getElementById('result').innerHTML = 
                    `<p class="error">Ошибка от Twitch: ${error} — ${urlParams.get('error_description') || ''}</p>`;
                return;
            }

            if (code) {
                if (!state) {
                    document.getElementById('result').innerHTML = 
                        '<p class="error">Не передан параметр state (code_verifier). Повторите авторизацию.</p>';
                    return;
                }

                // Декодируем code_verifier из state
                let codeVerifier;
                try {
                    codeVerifier = atob(state);
                } catch (e) {
                    document.getElementById('result').innerHTML = 
                        '<p class="error">Ошибка декодирования state. Возможно, повреждён. Попробуйте заново.</p>';
                    return;
                }

                document.getElementById('result').innerHTML = '<p>⏳ Обмениваю код на токены...</p>';

                const tokenData = await exchangeCode(code, codeVerifier);
                if (tokenData.access_token) {
                    document.getElementById('result').innerHTML += 
                        `<h2>✅ Токены получены!</h2>
                         <p><b>Access Token (TWITCH_OAUTH_TOKEN):</b></p>
                         <div class="token">oauth:${tokenData.access_token}</div>
                         <p><b>Refresh Token (TWITCH_REFRESH_TOKEN):</b></p>
                         <div class="token">${tokenData.refresh_token}</div>
                         <p>Скопируйте оба токена и отправьте администратору бота.</p>`;
                } else {
                    document.getElementById('result').innerHTML += 
                        `<p class="error">Ошибка обмена токена: ${JSON.stringify(tokenData)}</p>`;
                }
            }
        };
    </script>
</body>
</html>
