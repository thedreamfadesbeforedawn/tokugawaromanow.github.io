<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Twitch токен для бота (автообновление)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        .token { background: #f5f5f5; padding: 15px; margin: 15px 0; word-break: break-all; border-radius: 6px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Twitch токен для бота</h1>
    <p>Нажми кнопку и авторизуйся под своим стримерским аккаунтом.<br>После этого ты получишь два токена — их нужно скопировать и отправить разработчику.</p>
    <button id="loginBtn">Авторизоваться через Twitch</button>
    <div id="result"></div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const CLIENT_ID = 'lwm2jnjjybtj63e78up4h59h40imel';
        const REDIRECT_URI = window.location.href.split('?')[0]; // текущая страница

        // Генерируем code_verifier и code_challenge (PKCE)
        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return base64URLEncode(array);
        }

        function base64URLEncode(buffer) {
            let str = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.length; i++) {
                str += String.fromCharCode(bytes[i]);
            }
            return btoa(str)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return base64URLEncode(hash);
        }

        // Запуск авторизации
        async function startAuth() {
            const codeVerifier = generateCodeVerifier();
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            // Сохраняем code_verifier, чтобы использовать позже
            localStorage.setItem('twitch_code_verifier', codeVerifier);

            const authUrl = 'https://id.twitch.tv/oauth2/authorize?' +
                'client_id=' + CLIENT_ID +
                '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                '&response_type=code' +
                '&scope=chat:read+chat:edit' +
                '&code_challenge=' + codeChallenge +
                '&code_challenge_method=S256';

            window.location.href = authUrl;
        }

        // Обмен кода на токены
        async function exchangeCode(code, codeVerifier) {
            const response = await fetch('https://id.twitch.tv/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    code: code,
                    grant_type: 'authorization_code',
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier
                })
            });
            return response.json();
        }

        // Обработка при загрузке страницы
        window.onload = async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                document.getElementById('result').innerHTML = 
                    `<p class="error">Ошибка: ${error} - ${urlParams.get('error_description') || ''}</p>`;
                return;
            }

            if (code) {
                const codeVerifier = localStorage.getItem('twitch_code_verifier');
                if (!codeVerifier) {
                    document.getElementById('result').innerHTML = 
                        '<p class="error">Потерян code_verifier. Попробуйте заново.</p>';
                    return;
                }
                localStorage.removeItem('twitch_code_verifier');

                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('result').innerHTML = '<p>⏳ Обмен кода на токены...</p>';

                const tokenData = await exchangeCode(code, codeVerifier);
                if (tokenData.access_token) {
                    document.getElementById('result').innerHTML = 
                        `<h2>✅ Токены получены!</h2>
                         <p><b>Access Token (TWITCH_OAUTH_TOKEN):</b></p>
                         <div class="token">oauth:${tokenData.access_token}</div>
                         <p><b>Refresh Token (TWITCH_REFRESH_TOKEN):</b></p>
                         <div class="token">${tokenData.refresh_token}</div>
                         <p>Скопируй оба токена и отправь администратору бота.</p>`;
                        console.log('Обмен кода с параметрами:');
                        console.log('client_id:', CLIENT_ID);
                        console.log('code:', code);
                        console.log('redirect_uri:', REDIRECT_URI);
                        console.log('code_verifier:', codeVerifier);
                } else {
                    document.getElementById('result').innerHTML = 
                        `<p class="error">Ошибка получения токенов: ${JSON.stringify(tokenData)}</p>`;
                }
            }
        };

        // Назначение кнопки
        document.getElementById('loginBtn').addEventListener('click', startAuth);
    </script>
</body>
</html>
