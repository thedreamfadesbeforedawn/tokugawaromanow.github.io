<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Twitch токен для бота (безопасный)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        .token { background: #f5f5f5; padding: 15px; margin: 15px 0; word-break: break-all; border-radius: 6px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Twitch токен для бота</h1>
    <p>Нажмите кнопку и авторизуйтесь под своим стримерским аккаунтом.</p>
    <button onclick="startAuth()">Авторизоваться через Twitch</button>
    <div id="result"></div>

    <script>
        const CLIENT_ID = 'ah9sy9p5b1x1dab25mweoeuvbpuwin'; // Ваш новый публичный Client ID
        const REDIRECT_URI = window.location.href.split('?')[0];

        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return base64URLEncode(array);
        }

        function base64URLEncode(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let i = 0; i < bytes.length; i++) {
                str += String.fromCharCode(bytes[i]);
            }
            // Использование btoa с корректной обработкой ошибок
            try {
                return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            } catch (e) {
                console.error("Ошибка base64URLEncode:", e);
                return '';
            }
        }

        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return base64URLEncode(hash);
        }

        async function startAuth() {
            const codeVerifier = generateCodeVerifier();
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            // Сохраняем в sessionStorage (работает даже в инкогнито)
            sessionStorage.setItem('twitch_code_verifier', codeVerifier);
            
            const authUrl = 'https://id.twitch.tv/oauth2/authorize?' +
                'client_id=' + CLIENT_ID +
                '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                '&response_type=code' +
                '&scope=chat:read+chat:edit' +
                '&code_challenge=' + codeChallenge +
                '&code_challenge_method=S256';
            
            window.location.href = authUrl;
        }

        async function exchangeCode(code, codeVerifier) {
            const body = new URLSearchParams({
                client_id: CLIENT_ID,
                code: code,
                grant_type: 'authorization_code',
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            });

            // Детальный вывод отладки ПЕРЕД отправкой
            document.getElementById('result').innerHTML = 
                `<div style="background:#e6e6fa; padding: 10px; margin: 15px 0; text-align: left;">
                    <b>Отправка запроса:</b><br>
                    client_id: ${CLIENT_ID}<br>
                    redirect_uri: ${REDIRECT_URI}<br>
                    code (начало): ${code.substring(0, 10)}...<br>
                    code_verifier (начало): ${codeVerifier.substring(0, 10)}...<br>
                    <span style="color:red;">В настройках Twitch должен быть URL: ${REDIRECT_URI}</span>
                </div>`;

            const response = await fetch('https://id.twitch.tv/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            });
            return response.json();
        }

        window.onload = async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                document.getElementById('result').innerHTML = 
                    `<p style="color:red;">Ошибка Twitch: ${error} — ${urlParams.get('error_description') || ''}</p>`;
                return;
            }

            if (code) {
                const codeVerifier = sessionStorage.getItem('twitch_code_verifier');
                sessionStorage.removeItem('twitch_code_verifier');
                
                if (!codeVerifier) {
                    document.getElementById('result').innerHTML = 
                        '<p style="color:red;">Ошибка: потерян code_verifier. Попробуйте авторизоваться заново в обычном режиме браузера.</p>';
                    return;
                }

                const tokenData = await exchangeCode(code, codeVerifier);
                
                if (tokenData.access_token) {
                    document.getElementById('result').innerHTML += 
                        `<h2 style="color:green;">Токены получены!</h2>
                         <p><b>Access Token:</b></p>
                         <div class="token">oauth:${tokenData.access_token}</div>
                         <p><b>Refresh Token:</b></p>
                         <div class="token">${tokenData.refresh_token}</div>`;
                } else {
                    document.getElementById('result').innerHTML += 
                        `<p style="color:red;">Ошибка от Twitch: ${JSON.stringify(tokenData)}</p>`;
                }
            }
        };
    </script>
</body>
</html>
